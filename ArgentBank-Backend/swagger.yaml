swagger: '2.0'

info:
  title: Bank Argent API documentation
  description: Contains all available API endpoints in this codebase
  version: '1.0.0'

host: localhost:3001
basePath: /api/v1

schemes:
  - http

tags:
  - name: User Module
  - name: Accounts Module

paths:

# ---------------- USER MODULE ----------------

  /user/login:
    post:
      tags:
        - User Module
      summary: Login
      description: Authenticate user and return token
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/Login'
      produces:
        - application/json
      responses:
        '200':
          description: Login successfully
          schema:
            $ref: '#/definitions/LoginResponse'
        '400':
          description: Invalid credentials
        '500':
          description: Internal server error

  /user/signup:
    post:
      tags:
        - User Module
      summary: Signup
      description: Create a new user account
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/User'
      produces:
        - application/json
      responses:
        '200':
          description: User created successfully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal server error

  /user/profile:
    get:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: Get user profile
      description: Returns authenticated user profile
      responses:
        '200':
          description: Profile retrieved successfully
          schema:
            $ref: '#/definitions/UserProfileResponse'
        '400':
          description: Invalid request
        '500':
          description: Internal server error

    put:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: Update user profile
      description: Update user public username
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/UserProfile'
      responses:
        '200':
          description: Profile updated successfully
          schema:
            $ref: '#/definitions/UserProfileResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal server error


# ---------------- ACCOUNTS MODULE ----------------

  /accounts:
    get:
      security:
        - Bearer: []
      tags:
        - Accounts Module
      summary: Get user accounts
      description: Returns all accounts of authenticated user
      responses:
        '200':
          description: Accounts retrieved successfully
          schema:
            $ref: '#/definitions/AccountsResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /accounts/{accountId}/transactions:
    get:
      security:
        - Bearer: []
      tags:
        - Accounts Module
      summary: Get account transactions
      description: Returns transactions for selected account and current month
      parameters:
        - name: accountId
          in: path
          required: true
          type: string
        - name: month
          in: query
          required: false
          type: string
          description: "Format YYYY-MM (ex: 2026-04)"
      responses:
        '200':
          description: Transactions retrieved successfully
          schema:
            $ref: '#/definitions/TransactionsResponse'
        '401':
          description: Unauthorized
        '404':
          description: Account not found
        '500':
          description: Internal server error

  /transactions/{transactionId}:
    get:
      security:
        - Bearer: []
      tags:
        - Accounts Module
      summary: Get transaction details
      description: Returns complete details for one transaction
      parameters:
        - name: transactionId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Transaction retrieved successfully
          schema:
            $ref: '#/definitions/TransactionResponse'
        '401':
          description: Unauthorized
        '404':
          description: Transaction not found
        '500':
          description: Internal server error

    patch:
      security:
        - Bearer: []
      tags:
        - Accounts Module
      summary: Update transaction information
      description: Add or modify category or note for a transaction
      parameters:
        - name: transactionId
          in: path
          required: true
          type: string
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/TransactionUpdate'
      responses:
        '204':
          description: Transaction updated successfully
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Transaction not found
        '500':
          description: Internal server error


securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header


definitions:

# ---------------- USER ----------------

  User:
    type: object
    properties:
      email:
        type: string
      password:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      userName:
        type: string

  Login:
    type: object
    properties:
      email:
        type: string
      password:
        type: string

  LoginResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: object
        properties:
          token:
            type: string

  UserProfile:
    type: object
    properties:
      userName:
        type: string

  UserProfileResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: object
        properties:
          id:
            type: string
          email:
            type: string
          firstName:
            type: string
          lastName:
            type: string
          userName:
            type: string

# ---------------- ACCOUNTS ----------------

  AccountsResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            label:
              type: string
            balance:
              type: number
            currency:
              type: string

  TransactionsResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: array
        items:
          $ref: '#/definitions/Transaction'

  TransactionResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        $ref: '#/definitions/Transaction'

  Transaction:
    type: object
    properties:
      id:
        type: string
      date:
        type: string
      description:
        type: string
      amount:
        type: number
      balance:
        type: number
      category:
        type: string
      note:
        type: string

  TransactionUpdate:
    type: object
    properties:
      category:
        type: string
      note:
        type: string

# ---------------- GENERIC ----------------

  ApiResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string